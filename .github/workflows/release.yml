name: release-on-main

on:
	push:
		branches:
			- main

permissions:
	contents: write

jobs:
	release:
		if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
		runs-on: ubuntu-latest

		steps:
			- name: Checkout
				uses: actions/checkout@v4
				with:
					fetch-depth: 0

			- name: Bump VERSION patch
				id: bump
				shell: bash
				run: |
					set -euo pipefail

					if [[ ! -f VERSION ]]; then
						echo "V0.0.0" > VERSION
					fi

					CURRENT=$(tr -d '[:space:]' < VERSION)
					if [[ ! "$CURRENT" =~ ^V([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
						CURRENT="V0.0.0"
					fi

					MAJOR=$(echo "$CURRENT" | sed -E 's/^V([0-9]+)\.([0-9]+)\.([0-9]+)$/\1/')
					MINOR=$(echo "$CURRENT" | sed -E 's/^V([0-9]+)\.([0-9]+)\.([0-9]+)$/\2/')
					PATCH=$(echo "$CURRENT" | sed -E 's/^V([0-9]+)\.([0-9]+)\.([0-9]+)$/\3/')

					NEXT_PATCH=$((PATCH + 1))
					NEXT="V${MAJOR}.${MINOR}.${NEXT_PATCH}"

					echo "$NEXT" > VERSION
					echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"

			- name: Commit version bump
				shell: bash
				run: |
					set -euo pipefail
					git config user.name "github-actions[bot]"
					git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

					git add VERSION
					if git diff --cached --quiet; then
						echo "No VERSION changes to commit"
					else
						git commit -m "chore: bump version to ${{ steps.bump.outputs.next_version }} [skip ci]"
						git push origin main
					fi

			- name: Create and push tag
				shell: bash
				run: |
					set -euo pipefail
					TAG="${{ steps.bump.outputs.next_version }}"

					if git rev-parse "$TAG" >/dev/null 2>&1; then
						echo "Tag already exists: $TAG"
					else
						git tag "$TAG"
						git push origin "$TAG"
					fi

			- name: Publish GitHub release
				uses: softprops/action-gh-release@v2
				with:
					tag_name: ${{ steps.bump.outputs.next_version }}
					name: Release ${{ steps.bump.outputs.next_version }}
					body: |
						Automatic release generated from push to main.
						Version source of truth: VERSION file.
					generate_release_notes: true
