name: release-on-main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from file
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f VERSION ]]; then
            echo "VERSION file missing" >&2
            exit 1
          fi

          VERSION_VALUE=$(tr -d '[:space:]' < VERSION)
          if [[ ! "$VERSION_VALUE" =~ ^V[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION format. Expected Vx.x.x" >&2
            exit 1
          fi

          echo "value=$VERSION_VALUE" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if needed
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.value }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Release ${{ steps.version.outputs.value }}
          body: |
            Automatic release generated from push to main.
            Version source of truth: VERSION file.
          generate_release_notes: true
